<link rel="stylesheet" href="https://generativeart.online/css/10print.css">

<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
<script>
/* global nn */

let count = 0

function setup () {
  requestAnimationFrame(setup)

  const ran = nn.random('↭↺↻↷↶')

  const colors = ['#ffffff', '#8be9fd', '#ff79c6', '#ffd166']
  const c = nn.random(colors)

  nn.create('span')
    .content(ran)
    .css('color', c)
    .addTo('body')

  count++

  // 每50个字符换行 → grid感
  if (count % 50 === 0) {
    nn.create('br').addTo('body')
  }

  const y = nn.get('body').scrollHeight
  window.scrollTo(0, y)
}

nn.on('load', setup)
</script>
